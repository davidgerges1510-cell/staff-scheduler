databases:
  - name: staff-scheduler-db
    databaseName: staffscheduler
    user: staffuser
    plan: free

services:
  - type: web
    name: staff-scheduler
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: staff-scheduler-db
          property: connectionString
